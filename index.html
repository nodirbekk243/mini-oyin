
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>3D Mini O‘yin</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
    // Scene, Camera, Renderer
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Bola (player)
    const geometry = new THREE.BoxGeometry(1,1,1);
    const material = new THREE.MeshBasicMaterial({color: 0x00ff00});
    const player = new THREE.Mesh(geometry, material);
    scene.add(player);
    player.position.y = 0.5;

    // Tosiq
    const obstacleGeo = new THREE.BoxGeometry(1,1,1);
    const obstacleMat = new THREE.MeshBasicMaterial({color: 0xff0000});
    const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
    scene.add(obstacle);
    obstacle.position.z = -5;
    obstacle.position.y = 0.5;

    // Marraga yetish marker
    const finishGeo = new THREE.BoxGeometry(1,1,1);
    const finishMat = new THREE.MeshBasicMaterial({color: 0x0000ff});
    const finish = new THREE.Mesh(finishGeo, finishMat);
    scene.add(finish);
    finish.position.z = -10;
    finish.position.y = 0.5;

    camera.position.z = 5;
    camera.position.y = 2;
    camera.lookAt(0,0,0);

    let speed = 0.1;

    // Player control (up/down for jump)
    let jumping = false;
    document.addEventListener('keydown', (e)=>{
        if(e.code === "Space" && !jumping){
            jumping = true;
        }
    });

    let jumpHeight = 0;
    let up = true;

    function animate(){
        requestAnimationFrame(animate);

        // Jump logic
        if(jumping){
            if(up){
                jumpHeight += 0.2;
                player.position.y = 0.5 + jumpHeight;
                if(jumpHeight >= 2){ up = false; }
            } else {
                jumpHeight -= 0.2;
                player.position.y = 0.5 + jumpHeight;
                if(jumpHeight <= 0){ 
                    jumping = false; 
                    up = true; 
                    player.position.y = 0.5; 
                }
            }
        }

        // Obstacle simple movement
        obstacle.position.z += speed;
        if(obstacle.position.z > 5){ obstacle.position.z = -5; }

        // Finish check
        if(player.position.z <= finish.position.z + 0.5 && player.position.z >= finish.position.z - 0.5){
            alert("🎉 Level complete!");
            player.position.z = 0;
            finish.position.z -= 10; // next level
        }

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
